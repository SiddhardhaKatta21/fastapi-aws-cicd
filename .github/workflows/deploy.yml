name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (optional)
        run: |
          # If you have tests, add pytest to requirements.txt and run:
          # pip install pytest
          # pytest
          echo "No tests configured, skipping."

      - name: Generate deployment package
        run: |
          # Create a ZIP file of the application (excluding .git and .github)
          zip -r deploy_package.zip . -x "*.git*" ".github/*"

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ secrets.EB_APPLICATION_NAME }}
          environment_name: ${{ secrets.EB_ENVIRONMENT_NAME }}
          region: ap-southeast-2          # Replace with your region (e.g., us-east-1, eu-west-1)
          version_label: ${{ github.sha }}
          deployment_package: deploy_package.zip